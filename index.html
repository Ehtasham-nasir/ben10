.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    width:150px;
    height:200px;
    perspective:1000px;
}

.inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform 0.6s;
    transform-style:preserve-3d;
}

.card.flip .inner{
    transform:rotateY(180deg);
}

.front, .back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:10px;
}

.front img{
    width:100%;
    height:100%;
    border-radius:10px;
}

.back{
    background:gold;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    transform:rotateY(180deg);
}

</style>
